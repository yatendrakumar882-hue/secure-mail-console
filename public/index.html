<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secure Mail Console</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Password Gate -->
  <div id="password-gate" class="password-gate">
    <div class="gate-card fade-in">
      <div class="gate-icon"><i class="fa-solid fa-lock"></i></div>
      <h2>Access Protected</h2>
      <p>Enter the password to continue</p>
      <form id="gate-form">
        <div class="form-group">
          <div class="password-wrapper">
            <input type="password" id="gate-password" placeholder="Enter password..." required>
            <button type="button" id="toggle-gate-password" class="icon-button"><i class="fa-regular fa-eye"></i></button>
          </div>
        </div>
        <div id="gate-error" class="gate-error hidden">
          <i class="fa-solid fa-triangle-exclamation"></i><span>Incorrect password</span>
        </div>
        <button type="submit" id="gate-submit-btn" class="btn btn-primary btn-block">
          <i class="fa-solid fa-arrow-right-to-bracket"></i> Enter
        </button>
      </form>
    </div>
  </div>

  <div class="app-container hidden" id="main-app">
    <header class="app-header">
      <h1><i class="fa-solid fa-shield-halved"></i> Secure Mail Console</h1>
    </header>

    <section id="dashboard-section">
      <div class="dashboard-grid">
        <!-- Left Column -->
        <div class="card composer-card">
          <h3><i class="fa-solid fa-pen-to-square"></i> Compose Message</h3>
          <form id="compose-form">
            <div class="form-row">
              <div class="form-group half">
                <label for="dashboard-email">Your Gmail</label>
                <input type="email" id="dashboard-email" required>
              </div>
              <div class="form-group half">
                <label for="dashboard-password">App Password</label>
                <input type="password" id="dashboard-password" required>
              </div>
            </div>
            <div class="form-row">
              <div class="form-group half">
                <label for="sender-name">Sender Name</label>
                <input type="text" id="sender-name" required>
              </div>
              <div class="form-group half">
                <label for="subject">Email Subject</label>
                <input type="text" id="subject" required>
              </div>
            </div>
            <div class="form-group flex-grow">
              <label for="message-body">Message Body</label>
              <textarea id="message-body" required></textarea>
            </div>
            <div class="form-group">
              <label>Spam Protection</label>
              <div class="cf-turnstile" data-sitekey="1x00000000000000000000AA"></div>
            </div>
          </form>
        </div>

        <!-- Right Column -->
        <div class="right-column">
          <div class="card recipients-card">
            <h3><i class="fa-solid fa-users"></i> Recipients</h3>
            <textarea id="recipients-input"></textarea>
            <div id="email-validation-error" class="error-message hidden">Please enter valid recipients.</div>
          </div>

          <div class="card progress-card">
            <h3><i class="fa-solid fa-chart-pie"></i> Progress Monitor</h3>
            <div class="stats-grid">
              <span>Total: <span id="stat-total">0</span></span>
              <span>Sent: <span id="stat-sent">0</span></span>
              <span>Failed: <span id="stat-failed">0</span></span>
              <span>Remaining: <span id="stat-remaining">0</span></span>
            </div>
            <div class="status-indicator"><span id="status-text">Ready to send</span></div>
            <div class="control-buttons">
              <button id="send-btn" class="btn btn-success">Send All</button>
              <button id="stop-btn" class="btn btn-danger hidden">Stop</button>
            </div>
          </div>
        </div>
      </div>
    </section>
  </div>

  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  <script src="script.js"></script>
</body>
</html>

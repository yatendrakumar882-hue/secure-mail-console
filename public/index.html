<div class="dashboard-grid">
    <!-- Left Column -->
    <div class="card composer-card">
        <form id="compose-form">
            <div class="form-row">
                <div class="form-group half">
                    <label for="sender-name">Sender Name</label>
                    <input type="text" id="sender-name" required>
                </div>
                <div class="form-group half">
                    <label for="dashboard-email">Your Gmail</label>
                    <input type="email" id="dashboard-email" required>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group half">
                    <label for="dashboard-password">App Password</label>
                    <input type="password" id="dashboard-password" required>
                </div>
                <div class="form-group half">
                    <label for="subject">Subject</label>
                    <input type="text" id="subject" required>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group half flex-grow">
                    <label for="message-body">Message Body</label>
                    <textarea id="message-body" required></textarea>
                </div>
                <div class="form-group half flex-grow">
                    <label for="recipients-input">Recipients</label>
                    <textarea id="recipients-input" required></textarea>
                </div>
            </div>
            <div class="control-buttons">
                <button type="button" id="send-btn" class="btn btn-success flex-1">Send All</button>
                <button type="button" id="logout-btn" class="btn btn-danger flex-1">Logout</button>
            </div>
        </form>
    </div>
</div>
